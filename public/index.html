<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Funcionários</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="container">

        <h1>Cadastro de Funcionários</h1>

        <div class="formulario">
            <label for="campoNome">Nome:</label>
            <input type="text" id="campoNome" placeholder="Digite o nome">

            <label for="campoEmail">E-mail:</label>
            <input type="email" id="campoEmail" placeholder="Digite o e-mail">

            <label for="campoCargo">Cargo:</label>
            <input type="text" id="campoCargo" placeholder="Digite o cargo">

            <label for="campoDepartamento">Departamento:</label>
            <input type="text" id="campoDepartamento" placeholder="Digite o departamento">

            <label for="campoSenha">Senha:</label>
            <input type="password" id="campoSenha" placeholder="Digite a senha">

            <button onclick="cadastrarFuncionario()">
                Cadastrar Funcionário
            </button>

            <p id="mensagemErro" class="erro"></p>
        </div>

        <div class="contador">
            <h2>Total de Funcionários: <span id="totalFuncionarios">0</span></h2>
        </div>

        <div id="listaFuncionarios" class="lista-funcionarios"></div>

    </div>

    <script src="script.js"></script>

</body>
</html>
